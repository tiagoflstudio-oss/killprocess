name: Build & Release Flux OS

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write # Necessário para criar releases e dar push

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow requests

    - name: Sync Version
      run: python sync_version.py

    - name: Build Executable
      run: python build.py

    - name: Commit & Push version.json
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add version.json
        git commit -m "chore: update version.json [skip ci]" || echo "No changes to commit"
        git push origin main

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dist/Flux_OS_Sapphire.exe"
        tag: "latest"
        name: "FLUX OS Sapphire - Latest Build"
        body: "Build automatizado da versão mais recente do FLUX OS Sapphire."
        allowUpdates: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
